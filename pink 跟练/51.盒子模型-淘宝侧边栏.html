<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    /* 在这里写 CSS 样式 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    a {
      color: #1f1f1f1f;
      text-decoration: none;
    }

    ol,
    ul {
      /* 取消列表的小圆点 */
      list-style: none;
    }

    .service {
      width: 256px;
      height: 400px;
      background-color: #f7f7f7;
      padding: 8px 16px;
      margin: 100px auto;
      border-radius: 12px;
      font-weight: 600;
      line-height: 32px;
    }

    .active {
      color: #3d3b3a;
      font-size: 15px;
      /* 1. 设置左右外边距 5px */
      margin: 0 0px;
      /* 2. 预先设置内边距，这样背景色出现时文字就不会移动 */
      padding: 0 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .active:hover {
      color: #ff6600;
      background-color: #fff;
    }

    h4 img {
      width: 60px;
      height: 20px;
    }
  </style>
</head>

<body>
  <div class="service">
    <h4>分类<img src="./img/arrow.png" alt="11"></h4>
    <ul>
      <li class="active">鞋子</li>
    </ul>
  </div>
</body>

</html>
