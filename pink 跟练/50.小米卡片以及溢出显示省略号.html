<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小米卡片效果</title>
  <style>
    /* 在这里写 CSS 样式 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #f5f5f5;
    }

    .card {
      width: 234px;
      height: 300px;
      background-color: #fff;
      margin: 100px auto;
      text-align: center;
      transition: all 0.2s;
    }


    .card:hover {
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
    }

    .card img {
      width: 90%;
      margin-top: 20px;
    }

    .card .title {
      font-size: 14px;
      margin-top: 12px;
      font-weight: 400;
      color: #333333;
    }

    .card .desc {
      font-size: 12px;
      font-weight: 400;
      /* 单行文本溢出显示省略号 */
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      padding: 0 15px;
      color: #b0b0b0;
    }

    .card .price {
      font-size: 14px;
      font-weight: 400;
      color: #b0b0b0;
      margin-top: 10px;
    }

    .card .price .new {
      font-size: 14px;
      font-weight: 400;
      color: #ff6700;
    }

    .card .price .old {
      font-size: 14px;
      font-weight: 400;
      color: #b0b0b0;
      text-decoration: line-through;
    }
  </style>
</head>

<body>

  <!-- 在这里写网页结构 -->
  <div class="card">
    <img src="./mi.png" alt="">
    <h3 class="title">Xiaomi Buds 5</h3>
    <p class="desc">舒适无感佩戴｜高通全链路无损音频体验，等你来买</p>
    <p class="price">
      <span class="new">659元</span>&nbsp;<span class="old">699元</span>
    </p>
  </div>
  <div class="card">
    <img src="./mi.png" alt="">
    <h3 class="title">Xiaomi Buds 5</h3>
    <p class="desc">舒适无感佩戴｜高通全链路无损音频体验，等你来买</p>
    <p class="price">
      <span class="new">659元</span>&nbsp;<span class="old">699元</span>
    </p>
  </div>
</body>

</html>
